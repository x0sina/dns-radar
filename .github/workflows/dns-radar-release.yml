name: dns-radar-release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build release asset
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist

          asset_base="dns-radar-${VERSION}-${GOOS}-${GOARCH}"
          binary_name="${asset_base}"
          if [ "${GOOS}" = "windows" ]; then
            binary_name="${binary_name}.exe"
          fi

          CGO_ENABLED=0 GOOS="${GOOS}" GOARCH="${GOARCH}" \
            go build \
              -trimpath \
              -ldflags "-s -w -X dns-radar/internal/version.Value=${VERSION}" \
              -o "dist/${binary_name}" \
              ./cmd/scanner

          if [ "${GOOS}" = "windows" ]; then
            (
              cd dist
              zip "${asset_base}.zip" "${binary_name}"
            )
            echo "ASSET=dist/${asset_base}.zip" >> "${GITHUB_ENV}"
          else
            tar -C dist -czf "dist/${asset_base}.tar.gz" "${binary_name}"
            echo "ASSET=dist/${asset_base}.tar.gz" >> "${GITHUB_ENV}"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dns-radar-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.ASSET }}
          if-no-files-found: error

  release:
    name: publish-release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/**/*.tar.gz
            dist/**/*.zip
